# Netlify configuration for the Arvex Next.js 14 site.
# The official @netlify/plugin-nextjs handles SSR pages, API routes, image
# optimization, and edge middleware automatically — Netlify auto-installs it
# when it detects Next.js, but we declare it explicitly so it can never be
# missed.

[build]
  command = "npm run build"
  # No `publish` — @netlify/plugin-nextjs sets it automatically.

[build.environment]
  # Pin Node version so the build is reproducible. Node 20 supports the
  # --env-file flag we use in scripts (build itself doesn't need it).
  NODE_VERSION = "20"
  # Skip the husky / leftover postinstall scripts if any get added later.
  NPM_FLAGS = "--no-audit --no-fund"
  # Ensure Next.js uses the production target.
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cache the generated chandelier imagery aggressively — these never change
# without a code/manifest update.
[[headers]]
  for = "/assets/products/generated/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/consultation/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Lead inbox is a write endpoint — never cache.
[[headers]]
  for = "/api/lead"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/api/concierge"
  [headers.values]
    Cache-Control = "no-store"
